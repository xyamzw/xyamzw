########################################
# 基本配置
########################################
theme_version_check: true
theme_config_check: true
# 主菜单导航
# 有关更多图标信息，请访问 https://github.com/D-Sketon/hexo-theme-reimu/issues/30。
url: https://xyamzw.2937150394.workers.dev
root:  /blog/
menu:
  - name: home
    url: /
    icon: # 默认使用太极图标，您可以使用 FontAwesome 或 icon_font 的十六进制表示，例如'f0c1'
  - name: archives
    url: /archives
    icon:
  - name: about
    url: /about
    icon:
  - name: friend
    url: /friend
    icon:

banner: "/images/banner.webp" # 横幅图片，路径为 themes/reimu/source/images/banner.webp
# 您也可以使用以下形式的 URL:
# banner: "https://example.com"

# 如果您想使用 srcset 属性，请启用它
banner_srcset:
  enable: false
  srcset:
    - src: "/images/banner-600w.webp"
      media: "(max-width: 479px)"
    - src: "/images/banner-800w.webp"
      media: "(max-width: 799px)"
    - src: "/images/banner.webp"
      media: "(min-width: 800px)"

favicon: "/images/favicon.ico" # 网站图标，路径为 themes/reimu/source/images/favicon.ico
# 您也可以使用以下形式的 URL:
# favicon: "https://example.com"

avatar: "avatar.webp" # 头像图片，路径为 source/_data/avatar/avatar.webp

# 控制文章封面的显示
# 如果未设置,将默认显示横幅图片
# 其优先级低于 Front-matter 中的封面设置
cover: # https://example.com / false / rgb(255,117,117)

# 控制文章目录的显示
# 其优先级低于 Front-matter 中的目录设置
toc: true

# 启用 Open Graph 协议
# 参见 https://hexo.io/docs/helpers#open-graph
open_graph:
  enable: true
  options:
    #twitter_card: <twitter:card>
    #twitter_id: <twitter:creator>
    #twitter_site: <twitter:site>
    #twitter_image: <twitter:image>
    #google_plus: <g+:profile_link>
    #fb_admins: <fb:admin_id>
    #fb_app_id: <fb:app_id>
    default_og_image: /images/banner.webp # Open Graph 的默认 og:image，支持绝对路径

# Content
excerpt_link: Read More

# RSS
# need https://github.com/hexojs/hexo-generator-feed
rss: atom.xml

# 一个非常简单的替代方案，类似 https://hexo.io/api/injector
injector:
  head_begin: # 在 <head> 标签后立即注入代码片段
  head_end: # 在 </head> 标签前注入代码片段
  body_begin: # 在 <body> 标签后立即注入代码片段
  body_end: # 在 </body> 标签前注入代码片段
  sidebar_begin: # 在 <aside> 标签后立即注入代码片段
  sidebar_end: # 在 </aside> 标签前注入代码片段

# 页脚版权信息
copyright: # 在页脚版权信息处注入代码片段
# 需要帮助选择许可证？请参见...
# https://creativecommons.org/choose/
# https://choosealicense.com/
# copyright: |-
#   <div style="flex-direction:column;align-items: center;"><a rel="license" href="http://creativecommons.org/licenses/by/4.0/"><img alt="Creative Commons License" style="border-width:0" src="https://i.creativecommons.org/l/by/4.0/88x31.png" /></a>
#   All website licensed under <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY 4.0</a></div>

footer:
  since: 2024 # 从某年开始显示（如 2020-当前年份）
  powered: false #是否显示“Powered by”信息
  count: true # 是否显示字数统计和阅读时间
  busuanzi: true # 是否启用不蒜子统计
  icon:
    url: "../images/taichi.png" # 页脚图标设置，路径相对于 css/style.css，因此需要向上返回一级目录以访问 images 文件夹
    rotate: true # 是否旋转图标
    mask: true # 是否将图片用作蒙版

# 侧边栏位置
sidebar: left

# 社交媒体链接设置
social:
   email: mailto:xyamzw2356@gmail.com
   github: https://github.com/xyamzw
  # google: https://plus.google.com/yourname
   twitter: https://x.com/xyamzw
  # facebook: https://www.facebook.com/yourname
  # instagram: https://www.instagram.com/yourname
  # linkedin: https://www.linkedin.com/in/yourname
  # pinterest: https://www.pinterest.com/yourname
  # youtube: https://www.youtube.com/channel/yourname
  # vimeo: https://vimeo.com/yourname
  # flickr: https://www.flickr.com/photos/yourname
  # dribbble: https://dribbble.com/yourname
  # behance: https://www.behance.net/yourname
  # bilibili: https://space.bilibili.com/yourname
  # weibo: https://weibo.com/yourname
  # zhihu: https://www.zhihu.com/people/yourname
  # reddit: https://www.reddit.com/user/yourname
  # tumblr: https://yourname.tumblr.com
  # medium: https://medium.com/@yourname
  # deviantart: https://yourname.deviantart.com
  # stackoverflow: https://stackoverflow.com/users/yourname
  # keybase: https://keybase.io/yourname
  # telegram: https://t.me/yourname
  # discord: https://discordapp.com/users/yourname
  # steam: https://steamcommunity.com/id/yourname

# 侧边栏小部件
widgets:
  # - category
  # - tag
  # - tagcloud
  # - archive
  # - recent_posts

# 侧边栏行为
archive_type: "monthly" # 归档类型（按月）
show_count: false # 是否显示计数
tag_limits:
recent_posts_limits: 5 # 最近文章显示数量限制
tagcloud_limits:

# 归档行为
only_show_capsule_in_index: false # 如果您有大量标签和分类，可以设置为 true，仅在首页显示 capsule 以提高性能

i18n:
  enable: false
  type: [page, post]
  generator: [archive, category, tag, index]
  languages: [zh-CN, en]

########################################
# CSS
########################################

anchor_icon: # 默认使用“#”图标，您可以使用 FontAwesome 或 icon_font 的十六进制表示，例如“f0c1”
# 自定义鼠标光标设置
reimu_cursor:
  enable: true
  cursor:
    default: ../images/cursor/reimu-cursor-default.png  # 路径相对于 css/style.css，因此需要向上返回一级目录以访问 images 文件夹
    pointer: ../images/cursor/reimu-cursor-pointer.png
    text: ../images/cursor/reimu-cursor-text.png

# 设置为 false 以启用 FontAwesome
icon_font: 4552607_0khxww3tj3q9

# 字体加载策略
# 自定义字体 -> Google 字体 -> 本地后备字体(优先级从大到小)

# 自定义字体设置
custom_font:
  enable: false
  article:
    # - css: https://fontsapi.zeoseven.com/292/main/result.css
      # name: LXGW WenKai
  code:

# https://fonts.google.com/
# Google 字体设置，优先级高于本地字体
font:
  enable: true
  article:
    - Mulish
    - Noto Serif SC
  code:
    # - Ubuntu Mono
    # - Source Code Pro
    # - JetBrains Mono

# 本地后备字体设置
local_font:
  article:
    - "-apple-system"
    - PingFang SC
    - Microsoft YaHei
    - sans-serif
  code:
    - Menlo
    - Monaco
    - Consolas
    - monospace

# 暗黑模式设置
dark_mode:
  # 默认启用暗黑模式
  # 默认禁用暗黑模式
  # 根据系统设置自动切换暗黑模式
  enable: auto # true | false | auto

# need https://github.com/D-Sketon/hexo-renderer-markdown-it-plus
markdown:
  container: false # 是否启用容器样式

########################################
# Markdown Display
########################################

# need https://github.com/D-Sketon/hexo-renderer-markdown-it-plus
math:
  enable: false
  # 如果您不想使用它，请将 autoRender 设置为 true 以启用浏览器渲染
  katex:
    enable: true
    autoRender: false # 是否在浏览器中渲染数学公式，默认禁用
  mathjax:
    enable: false
    options: # see https://docs.mathjax.org/en/latest/web/configuration.html
      {
        tex:
          {
            tags: "ams",
            useLabelIds: true,
            inlineMath: [["$", "$"], ['\\(', '\\)']],
            displayMath: [["$$", "$$"], ['\\[', '\\]']],
            processEscapes: true,
            processEnvironments: true,
            autoload: { color: [], colorv2: ["color"] },
            packages: { "[+]": ["noerrors"] },
          },
        options:
          {
            skipHtmlTags:
              ["script", "noscript", "style", "textarea", "pre", "code"],
            ignoreHtmlClass: "tex2jax_ignore",
            processHtmlClass: "tex2jax_process",
          },
        loader: { load: ["input/asciimath", "[tex]/noerrors"] },
      }

# mermaid url https://github.com/knsv/mermaid
# need https://github.com/webappdevelp/hexo-filter-mermaid-diagrams
mermaid:
  enable: false

code_block:
  # 是否默认展开代码块
  # 默认展开所有代码块
  # 默认折叠所有代码块
  # 当代码行数超过指定值时默认折叠代码块
  expand: true

########################################
# Analytics
########################################
# 百度分析
baidu_analytics: false
# 谷歌分析
google_analytics: false
# Clarity 分析
clarity: false

########################################
# Comment system
########################################

# 全局评论系统控制
# 可以同时使用多个评论系统
# 加载顺序: localStorage(用户手动选择) -> default
# -> valine -> waline -> twikoo -> gitalk -> giscus
comment:
  # comment system title
  title: 说些什么吧！
  # or with i18n
  # title: 
  #   en: Say something!
  #   zh-CN: 说些什么吧！
  default: waline # default comment system, when you enable multiple comment systems

# Valine 评论系统，参见 https://valine.js.org
# version 1.5.1
# notify 和 verify 已弃用
valine:
  enable: flase # 是否启用valine评论系统
  appId:  # leancloud application app id
  appKey:  # leancloud application app key
  pageSize: 10 # comment list page size
  avatar: mp # Gravatar 头像样式，参见 https://valine.js.org/#/avatar
  lang: zh-cn # i18n: zh-cn/en
  placeholder: Just go go # valine 评论输入框的占位符(like: Please leave your footprints )
  guest_info: nick,mail,link #valine 评论头部信息
  recordIP: true # 是否记录评论者的 IP 地址
  highlight: true # 是否高亮代码块
  visitor: false # 是否显示访问者数量

# https://waline.js.org/
# version 2.15.8
waline:
  enable: false
  serverURL:
  lang: zh-CN
  locale: {} # https://waline.js.org/guide/features/i18n.html#%E8%87%AA%E5%AE%9A%E4%B9%89%E8%AF%AD%E8%A8%80
  emoji:
    - https://unpkg.com/@waline/emojis@1.2.0/weibo
    - https://unpkg.com/@waline/emojis@1.2.0/alus
    - https://unpkg.com/@waline/emojis@1.2.0/bilibili
    - https://unpkg.com/@waline/emojis@1.2.0/qq
    - https://unpkg.com/@waline/emojis@1.2.0/tieba
    - https://unpkg.com/@waline/emojis@1.2.0/tw-emoji
  meta:
    - nick
    - mail
    - link
  requiredMeta:
    - nick
    - mail
  wordLimit: 0
  pageSize: 10
  pageview: true

# https://twikoo.js.org
twikoo:
  enable: true
  envId: https://twikoo-commet.vercel.app # 腾讯云环境填 envId；Vercel 环境填地址（https://xxx.vercel.app）
  region:

# https://github.com/gitalk/gitalk/blob/master/readme-cn.md
gitalk:
  enable: false
  clientID:
  clientSecret:
  repo:
  owner:
  admin:
  md5: false

# https://giscus.app/zh-CN
giscus:
  enable: false
  repo:
  repoId:
  category:
  categoryId:
  mapping: mapping
  strict: 0
  reactionsEnabled: 1
  emitMetadata: 0
  inputPosition: bottom
  # commentTheme: light # this option is invalid, because the theme is set by the theme itself
  lang: zh-CN

########################################
# Search
########################################

# need https://github.com/D-Sketon/hexo-algoliasearch
# please add the following config in your _config.yml
# algolia:
#   appId: 'your applicationID'
#   apiKey: 'your apiKey'
#   adminApiKey: 'your adminApiKey'
#   indexName: 'your indexName'
#   chunkSize: 5000
#   fields:
#     - content:strip:truncate,0,500
#     - excerpt:strip
#     - gallery
#     - permalink
#     - photos
#     - slug
#     - tags
#     - title
algolia_search:
  enable: false
  hits:
    per_page: 10
  labels:
    input_placeholder: "搜索....."
    hits_empty: "未发现与 「${query}」相关内容"
    hits_stats: "找到${hits}条结果（用时 ${time} ms）"

generator_search:
  enable: true
  field: post
  content: true

########################################
# Animation
########################################

# 加载动画设置
preloader:
  enable: true
  text: 少女祈祷中...
  icon: # 默认使用内联 SVG 以提高速度，您可以使用图片 URL，例如'/images/taichi.png'
  rotate: true # 是否旋转图标

# see https://github.com/D-Sketon/aos.js
animation:
  enable: true
  options:
    header:
      title: slide-up
      subTitle: slide-down
    home:
      post: fade-up
      widget: fade-up
      sidebar: fade-up
    article:
      whole: fade-up
      date: zoom-in
      category: zoom-in
      tag: zoom-in
      comment: zoom-in
      reading: zoom-in
      nav: fade-up
    archive:
      whole: fade-up
      tag: zoom-in
      category: zoom-in
      section: fade-up
      nav: fade-up

# see https://github.com/D-Sketon/mouse-firework
firework:
  enable: true
  options:
    excludeElements: ["a", "button"]
    particles:
      - shape: circle
        move: ["emit"]
        easing: easeOutExpo
        colors: ["var(--red-1)", "var(--red-2)", "var(--red-3)", "var(--red-4)"]
        number: 20
        duration: [1200, 1800]
        shapeOptions:
          radius: [16, 32]
          alpha: [0.3, 0.5]
      - shape: circle
        move: ["diffuse"]
        easing: easeOutExpo
        colors: ["var(--red-0)"]
        number: 1
        duration: [1200, 1800]
        shapeOptions:
          radius: 20
          alpha: [0.2, 0.5]
          lineWidth: 6

########################################
# Extended features
########################################

# 剪贴板配置
clipboard:
  success: 复制成功(*^▽^*)
  fail: 复制失败 (ﾟ⊿ﾟ)ﾂ
  copyright: # 是否为复制内容添加版权信息
    enable: false
    count: 50 # 显示版权信息的字符数阈值
    content: 本文版权：本博客所有文章除特别声明外，均采用 BY-NC-SA 许可协议。转载请注明出处！

# 在首页显示分类卡片
home_categories:
  enable: true
  content:
    - categories: 前端开发 # string (single-layer category) or array (multi-layer category)
      cover: # empty means random cover
    - categories:
      cover:

# 是否在文章过时时显示通知
outdate:
  enable: false
  daysAgo: 180 # 文章超过多少天后被视为过时
  message: 本文最后更新于 {time}，请注意文中内容可能已经发生变化。

# 赞助
sponsor:
  enable: true
  tip: 请作者喝杯咖啡吧！
  icon:
    url: "../images/taichi.png" # this path is relative to the css/style.css, so it needs to go up one level to reach the images folder
    rotate: true
    mask: true # whether to use the images as a mask
  qr:
    # - name: 支付宝
    #   src: "/sponsor/alipay.jpg"
    # - name: 微信
    #   src: "/sponsor/wechat.png"

# ICP 备案
icp:
  icpnumber: # ICP备案号
  beian: # 网安备案号
  recordcode: # 网安备案链接中的recordcode参数

# show the copyright below each article
article_copyright:
  enable: false
  content:
    author: true
    link: true
    title: false
    date: false
    updated: false
    license: true

# Back To Top
top:
  enable: true
  position: right # left or right
  icon:
    url: "../images/taichi.png" # this path is relative to the css/style.css, so it needs to go up one level to reach the images folder
    rotate: true
    mask: true # whether to use the images as a mask

share:
  # - facebook
  # - twitter
  # - linkedin
  # - reddit
  # - weibo
  # - qq
  # - weixin

########################################
# Experimental features
########################################

# 实验性功能，可能存在许多 bug，谨慎启用！
pjax:
  enable: true

# Experimental
# https://github.com/GoogleChromeLabs/quicklink
quicklink:
  enable: false
  # requestIdleCallback 的超时时间（毫秒）.
  timeout: 3000
  # 是否将 options.el 容器中的 URL 视为高优先级
  # 当为 true 时，quicklink 将尝试使用 fetch() API（如果支持），而不是 link[rel=prefetch].
  priority: true
  # 确定哪些 URL 应被预加载
  # 仅支持字符串
  ignores: []

# https://github.com/CodeByZach/pace
pace:
  enable: true

# Experimental
service_worker:
  enable: false

# Experimental
live2d:
  enable: false
  position: left # left or right

# Experimental
live2d_widgets:
  enable: false
  position: left # left or right

# Experimental
# Please turn on pjax to use this feature
player:
  # if you enable meting, you must enable aplayer first
  aplayer:
    # https://github.com/DIYgod/APlayer
    enable: true
    options:
      audio: []
      fixed:
      autoplay:
      loop:
      order:
      preload: 
      volume:
      mutex:
      listFolded: true
      lrcType:
  meting:
    # https://github.com/metowolf/MetingJS
    # if you want to use meting, please enable aplayer first
    enable: true
    meting_api: # custom api
    options:
      id: 9129038103
      server: netease
      type: playlist
      auto:

########################################
# pangu.js
########################################

pangu:
  # more information: https://github.com/vinta/pangu.js 
  enable: false  # enable pangu.js to add space between Chinese and English

